name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  lint-test:
    name: Lint & Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [ "3.11", "3.12" ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies (dev+cli, editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,cli]

      - name: Check for missing dependencies
        run: pip check

      - name: Ruff static analysis
        run: |
          ruff check . | tee ruff.log
          black --check .

      - name: Upload Ruff log
        uses: actions/upload-artifact@v4
        with:
          name: ruff-log-${{ matrix.os }}-${{ matrix.python-version }}
          path: ruff.log

      - name: Mypy type checking
        run: mypy memory_system | tee mypy.log

      - name: Upload Mypy log
        uses: actions/upload-artifact@v4
        with:
          name: mypy-log-${{ matrix.os }}-${{ matrix.python-version }}
          path: mypy.log

      - name: Run tests with coverage
        run: pytest -q -m "not perf" --cov=memory_system --cov-report=term-missing --cov-report=xml --cov-fail-under=85 --junitxml=pytest-results.xml --durations=10

      - name: Show top 10 slowest tests
        run: |
          grep -A 10 "slowest" pytest-results.xml || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage.xml

      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: pytest-results.xml

      - name: Pytest summary
        run: |
          tail -n 20 pytest-results.xml || true

      - name: Coverage summary
        run: |
          grep -A 10 "TOTAL" coverage.xml || true

      - name: Fail if coverage below 90%
        run: |
          python <<'EOF'
          import sys
          import xml.etree.ElementTree as ET

          root = ET.parse('coverage.xml').getroot()
          percent = float(root.get('line-rate', 0)) * 100
          print(f"Coverage: {percent:.1f}%")
          if percent < 90:
              print("Coverage below 90%!")
              sys.exit(1)
          EOF
        shell: bash

      - name: Test summary
        run: |
          echo "Tests completed for ${{ matrix.os }} / Python ${{ matrix.python-version }}"

      - name: Cleanup pip cache (Linux only)
        if: runner.os == 'Linux'
        run: rm -rf ~/.cache/pip

      - name: Cleanup build artifacts
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          for path in ('.pytest_cache', '.mypy_cache'):
              shutil.rmtree(path, ignore_errors=True)
          PY

    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}

  docker-build-publish:
    name: Build & Publish Docker image
    runs-on: ubuntu-latest
    needs: lint-test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
