# pytest.ini
[pytest]
minversion = 6.0
addopts = -ra -q
testpaths = 
    tests
    memory_system
markers =
    property    : property-based tests (Hypothesis)
    perf        : performance / load tests
    benchmark   : explicit micro-benchmarks
    slow        : really slow, запускаем редко
    
filterwarnings =
    ignore::DeprecationWarning
